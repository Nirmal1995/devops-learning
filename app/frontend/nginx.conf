server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health endpoint for container orchestrators.
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # SPA fallback: any route that doesn't match a file returns index.html.
    # React Router (and similar) handle the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed build assets aggressively; Vite adds content hashes to filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
